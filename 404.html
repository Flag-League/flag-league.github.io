<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex">
  <title>Human Flag League</title>
  <script>
    // GitHub Pages serves this for any unknown path. Encode the path into the
    // query string and bounce to the SPA, which restores it (see index.html).
    (function (l) {
      l.replace(
        l.protocol + '//' + l.host + '/?/' +
        l.pathname.slice(1).replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    }(window.location));
  </script>
</head>
<body></body>
</html>
