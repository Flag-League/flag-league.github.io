name: Validate teams.json

on:
  push:
    paths:
      - teams.json
      - teams.schema.json
      - .github/validate_teams.py
      - .github/workflows/validate.yml
  pull_request:
    paths:
      - teams.json
      - teams.schema.json
      - .github/validate_teams.py
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate teams.json
        run: python .github/validate_teams.py
